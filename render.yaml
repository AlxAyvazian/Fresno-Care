services:
  - type: web
    name: network-map
    runtime: node
    plan: free
    buildCommand: corepack enable && pnpm install --frozen-lockfile && pnpm --filter @workspace/occu-med-map build && pnpm --filter @workspace/api-server build
    startCommand: pnpm --filter @workspace/api-server start
    healthCheckPath: /api/healthz
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: network-map-db
          property: connectionString
      - key: GEOCODIO_TOKEN
        sync: false
      - key: GEOCODIO_SECONDARY_TOKEN
        sync: false
      - key: GEOCODIO_TERTIARY_TOKEN
        sync: false
      - key: GEOCODIO_QUATERNARY_TOKEN
        sync: false
      - key: BROWSE_AI_API_KEY
        sync: false
      - key: CLOD_API_KEY
        sync: false
      - key: EXA_API_KEY
        sync: false
      - key: FIRECRAWL_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: OLOSTEP_API_KEY
        sync: false
      - key: OPENROUTER_KEY
        sync: false
      - key: SERPER_API_KEY
        sync: false
      - key: TAVILY_API_KEY
        sync: false
      - key: CEREBRAS_API_KEY
        sync: false
      - key: LANGSEARCH_API_KEY
        sync: false
      - key: HUGGINGFACE_API_KEY
        sync: false
      - key: MINIMAX_API_KEY
        sync: false
      - key: PINECONE_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: BROWSERBASE_API_KEY
        sync: false
      - key: RAPIDAPI_ENABLED
        sync: false
      - key: RAPIDAPI_GEOCODING_ENABLED
        sync: false
      - key: RAPIDAPI_KEY
        sync: false
      - key: RAPIDAPI_LOCATION_LOOKUP_ENABLED
        sync: false
      - key: RAPIDAPI_MAP_DISPLAY_ENABLED
        sync: false
      - key: RAPIDAPI_PROVIDER_SEARCH_ENABLED
        sync: false
      - key: RAPIDAPI_ROUTING_DISTANCE_ENABLED
        sync: false
      - key: RAPIDAPI_PROVIDER_SEARCH_URL
        sync: false
      - key: RAPIDAPI_PROVIDER_SEARCH_HOST
        sync: false
      - key: RAPIDAPI_PROVIDER_SEARCH_PATH
        sync: false
      - key: RAPIDAPI_PROVIDER_SEARCH_TIMEOUT_MS
        sync: false

databases:
  - name: network-map-db
    databaseName: network_map
    user: network_map
    plan: free
