services:
  - type: web
    name: network-map
    runtime: node
    plan: free
    buildCommand: corepack enable && pnpm install --frozen-lockfile && pnpm --filter @workspace/occu-med-map build && pnpm --filter @workspace/api-server build
    startCommand: pnpm --filter @workspace/api-server start
    healthCheckPath: /api/healthz
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: network-map-db
          property: connectionString
      - key: GEOAPIFY_API_KEY
        sync: false

databases:
  - name: network-map-db
    databaseName: network_map
    user: network_map
    plan: free
