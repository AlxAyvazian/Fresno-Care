name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Typecheck
        id: typecheck
        shell: bash
        run: |
          set +e
          pnpm run typecheck > typecheck.log 2>&1
          status=$?
          cat typecheck.log
          exit $status

      - name: Upload typecheck diagnostics
        if: failure() && steps.typecheck.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: typecheck-diagnostics
          path: typecheck.log
          if-no-files-found: error
          retention-days: 3

      - name: Build
        run: pnpm run build
        env:
          NODE_ENV: production
          BASE_PATH: /
