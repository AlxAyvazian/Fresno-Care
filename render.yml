services:
  - type: static_site
    name: occu-med-map-web
    runtime: static
    plan: free
    buildCommand: corepack enable && pnpm install --frozen-lockfile && pnpm --filter @workspace/occu-med-map build
    staticPublishPath: occu-med-map/dist/public
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  - type: web
    name: occu-med-map-api
    runtime: node
    plan: free
    buildCommand: corepack enable && pnpm install --frozen-lockfile && pnpm --filter @workspace/api-server build
    startCommand: pnpm --filter @workspace/api-server start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: NODE_ENV
        value: production
